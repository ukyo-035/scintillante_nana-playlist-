<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>scintillante nana playlist</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>scintillante nana playlist</h1>

</header>

<div class="layout">

<nav>

<h3>プレイリスト</h3>
<ul id="playlistMenu"></ul>

<h3>ユニット</h3>
<ul id="unitMenu"></ul>

<h3>メンバー</h3>
<ul id="memberMenu"></ul>

</nav>

<main>

<ul id="songList"></ul>

</main>

</div>

<footer>

<button onclick="prevSong()">◀</button>
<button onclick="togglePlay()">▶</button>
<button onclick="nextSong()">▶▶</button>

<span id="nowPlaying"></span>

<audio id="audio"></audio>

</footer>

<script src="../config.js"></script>
<script src="player.js"></script>

</body>
</html>
